<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapping Area — Preview Demo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root,html[data-theme="light"]{--color-primary:#1F3A5F;--color-primary-hover:#2A4A78;--color-primary-dark:#14273F;--color-bg:#F2F3F5;--color-surface:#FFFFFF;--color-border:#DDE1E6;--color-text:#1C2733;--color-text-secondary:#5B6774;--color-success:#1E7B4D;--color-warning:#9A6700;--color-danger:#B3261E;--color-info:#0B6E99;--color-sidebar-bg:#16283F;--color-sidebar-active:#2A4A78;--color-sidebar-text:#C4D0DE;--shadow-sm:0 1px 2px rgba(16,24,32,.06);--shadow-md:0 4px 12px rgba(16,24,32,.10);--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--sidebar-width:260px;--topbar-height:60px;}
html[data-theme="dark"]{--color-bg:#15191E;--color-surface:#1D232B;--color-border:#323B47;--color-text:#E7EBF0;--color-text-secondary:#9AA6B2;}
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--color-bg);color:var(--color-text)}
.hidden{display:none!important}
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);flex-shrink:0;background:var(--color-sidebar-bg);color:var(--color-sidebar-text);display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:16px;font-size:16px;font-weight:700;color:#fff}
.sidebar-brand i{color:#6FA8DC}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 10px}
.nav-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6E7E93;padding:10px 10px 3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;margin:2px 0;font-size:13px;cursor:pointer}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--color-sidebar-active);color:#fff}
.nav-item i{width:16px;text-align:center}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:var(--topbar-height);flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--color-surface);border-bottom:1px solid var(--color-border)}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn:hover{background:var(--color-bg)}
.page-title{font-size:18px;font-weight:600;margin-right:auto}
.topbar-search{flex:1;max-width:320px;display:flex;align-items:center;gap:8px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:8px;padding:7px 10px;color:var(--color-text-secondary)}
.topbar-search input{flex:1;border:none;background:transparent;outline:none;color:var(--color-text);font-size:13px}
.user-chip{display:flex;align-items:center;gap:8px;background:none;border:none;padding:6px 8px;border-radius:8px;color:var(--color-text);cursor:pointer}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.page-content{flex:1;overflow-y:auto;padding:18px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(31,58,95,.1);color:var(--color-primary)}
.stat-value{font-size:20px;font-weight:700}
.stat-label{font-size:11px;color:var(--color-text-secondary)}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;box-shadow:var(--shadow-sm);padding:16px}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.table-wrap{overflow-x:auto;border:1px solid var(--color-border);border-radius:10px;background:var(--color-surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;background:var(--color-bg);color:var(--color-text-secondary);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--color-border)}
td{padding:9px 12px;border-bottom:1px solid var(--color-border)}
.badge{display:inline-flex;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600}
.badge-success{background:rgba(30,123,77,.12);color:var(--color-success)}
.badge-warning{background:rgba(154,103,0,.12);color:var(--color-warning)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:1px solid transparent;font-size:12px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-secondary{background:var(--color-surface);border-color:var(--color-border);color:var(--color-text)}
#map-demo{height:360px;border-radius:10px;overflow:hidden;border:1px solid var(--color-border)}
.demo-banner{background:#9A6700;color:#fff;font-size:12px;text-align:center;padding:6px}
@media (max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}}
@media (max-width:600px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50;transition:transform .2s}.sidebar.open{transform:translateX(0)}.stat-grid{grid-template-columns:1fr}.topbar-search{display:none}}
</style>
</head>
<body>
<div class="demo-banner"><i class="fa-solid fa-circle-info"></i> Ini PREVIEW tampilan saja (data dummy, tanpa Supabase) — bukan file app.js/config.js yang sebenarnya.</div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-map-location-dot"></i> Mapping Area</div>
    <nav class="sidebar-nav" id="nav"></nav>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input placeholder="Cari project, rumah, ODP, ODC..."></div>
      <button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
      <div class="user-chip"><span class="avatar">A</span> Admin</div>
    </header>
    <main class="page-content" id="content"></main>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const NAV = [
 {t:'Utama',items:[['dashboard','fa-gauge-high','Dashboard'],['project','fa-folder','Project']]},
 {t:'GIS',items:[['mapping','fa-map','Mapping'],['area','fa-draw-polygon','Area']]},
 {t:'Inventaris Aset',items:[['rumah','fa-house','Rumah'],['tiang','fa-tower-cell','Tiang Besi'],['odc','fa-server','ODC'],['odp','fa-diagram-project','ODP']]},
 {t:'Jaringan',items:[['pop','fa-database','POP'],['backbone','fa-timeline','Backbone']]},
 {t:'Planning',items:[['boq','fa-list-check','BOQ']]},
];
const navEl=document.getElementById('nav');
NAV.forEach(g=>{
  navEl.insertAdjacentHTML('beforeend',`<div class="nav-group-title">${g.t}</div>`);
  g.items.forEach(([key,icon,label])=>{
    const d=document.createElement('div');
    d.className='nav-item'+(key==='dashboard'?' active':'');
    d.innerHTML=`<i class="fa-solid ${icon}"></i><span>${label}</span>`;
    d.onclick=()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));d.classList.add('active');render(key,label);document.getElementById('sidebar').classList.remove('open');};
    navEl.appendChild(d);
  });
});
function toggleTheme(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('theme-icon').className=dark?'fa-solid fa-moon':'fa-solid fa-sun';
}
function render(key,label){
  document.getElementById('page-title').textContent=label;
  const c=document.getElementById('content');
  if(key==='dashboard'){
    c.innerHTML=`
    <div class="stat-grid">
      ${statCard('fa-folder','24','Total Project')}
      ${statCard('fa-draw-polygon','58','Total Area')}
      ${statCard('fa-house','128.400','Total Rumah')}
      ${statCard('fa-tower-cell','3.210','Total Tiang')}
      ${statCard('fa-server','142','Total ODC')}
      ${statCard('fa-diagram-project','1.860','Total ODP')}
      ${statCard('fa-wifi','67%','Coverage')}
      ${statCard('fa-clipboard-check','82%','Progress Survey')}
    </div>
    <div class="dash-grid">
      <div class="card"><h3>Aktivitas Terbaru</h3>
        <table><tr><th>Waktu</th><th>Aktivitas</th><th>Oleh</th></tr>
        <tr><td>10:20</td><td>Import KMZ Area Bekasi Selatan</td><td>Rian</td></tr>
        <tr><td>09:55</td><td>Tambah 12 ODP baru</td><td>Sinta</td></tr>
        <tr><td>09:10</td><td>Approve Scenario v3</td><td>Admin</td></tr>
        </table>
      </div>
      <div class="card"><h3>Status Project</h3>
        <p><span class="badge badge-success">Selesai</span> 12 project</p>
        <p><span class="badge badge-warning">Berjalan</span> 12 project</p>
      </div>
    </div>`;
  } else if(key==='mapping'||key==='area'){
    c.innerHTML=`<div id="map-demo"></div>`;
    setTimeout(()=>{
      const map=L.map('map-demo').setView([-6.2,106.8166],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      L.circleMarker([-6.2,106.8166],{color:'#1F3A5F'}).addTo(map).bindPopup('Contoh ODP-001');
      L.circleMarker([-6.205,106.82],{color:'#0B6E99'}).addTo(map).bindPopup('Contoh Rumah');
    },50);
  } else if(key==='rumah'||key==='tiang'||key==='odc'||key==='odp'||key==='pop'||key==='backbone'){
    c.innerHTML=`<div class="table-wrap"><table>
      <tr><th>Nama</th><th>Status</th><th>Aksi</th></tr>
      <tr><td>${label}-001</td><td><span class="badge badge-success">Aktif</span></td><td><button class="btn btn-secondary">Edit</button></td></tr>
      <tr><td>${label}-002</td><td><span class="badge badge-warning">Survey</span></td><td><button class="btn btn-secondary">Edit</button></td></tr>
      </table></div>
      <br><button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Tambah ${label}</button>`;
  } else {
    c.innerHTML=`<div class="card"><h3>${label}</h3><p style="color:var(--color-text-secondary)">Modul ini contoh tampilan — akan lengkap pada fase pembangunan sesuai roadmap.</p></div>`;
  }
}
function statCard(icon,val,label){
  return `<div class="stat-card"><div class="stat-icon"><i class="fa-solid ${icon}"></i></div><div><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div></div>`;
}
render('dashboard','Dashboard');
</script>
</body>
</html>
