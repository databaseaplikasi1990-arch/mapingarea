<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapping Area</title>

<!-- ================= PLUGIN CSS (CDN) ================= -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- ================= APP CSS ================= -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================================================= -->
<!-- SPLASH / LOADING                                         -->
<!-- ======================================================= -->
<div id="app-splash" class="app-splash">
  <div class="splash-logo"><i class="fa-solid fa-map-location-dot"></i></div>
  <div class="splash-title">Mapping Area</div>
  <div class="splash-spinner"></div>
</div>

<!-- ======================================================= -->
<!-- AUTH SCREEN (Login)                                      -->
<!-- ======================================================= -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="auth-brand">
      <i class="fa-solid fa-map-location-dot"></i>
      <span>Mapping Area</span>
    </div>
    <p class="auth-subtitle">Masuk untuk melanjutkan</p>

    <form id="login-form" class="auth-form">
      <label class="field-label">Email</label>
      <input type="email" id="login-email" class="text-input" placeholder="nama@perusahaan.com" required autocomplete="username">

      <label class="field-label">Kata Sandi</label>
      <input type="password" id="login-password" class="text-input" placeholder="••••••••" required autocomplete="current-password">

      <div class="auth-row">
        <label class="checkbox-label">
          <input type="checkbox" id="login-remember"> Ingat saya
        </label>
        <a href="#" id="forgot-password-link" class="link-muted">Lupa sandi?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-submit-btn">
        <span class="btn-label">Masuk</span>
      </button>
      <p class="auth-error" id="login-error"></p>
    </form>
  </div>
</div>

<!-- ======================================================= -->
<!-- APP SHELL                                                -->
<!-- ======================================================= -->
<div id="app-shell" class="app-shell hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <i class="fa-solid fa-map-location-dot"></i>
      <span class="sidebar-brand-text">Mapping Area</span>
      <button id="sidebar-collapse-btn" class="icon-btn sidebar-collapse-btn" title="Ciutkan menu">
        <i class="fa-solid fa-angles-left"></i>
      </button>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"><!-- diisi oleh app.js --></nav>
    <div class="sidebar-footer">
      <span id="sidebar-version">v1.0.0</span>
    </div>
  </aside>

  <!-- BACKDROP untuk sidebar mode mobile -->
  <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- TOPBAR / TOOLBAR -->
    <header class="topbar">
      <button id="sidebar-toggle-btn" class="icon-btn" title="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>

      <h1 id="page-title" class="page-title">Dashboard</h1>

      <div class="topbar-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="global-search" placeholder="Cari project, rumah, ODP, ODC...">
      </div>

      <div class="topbar-actions">
        <button id="theme-toggle-btn" class="icon-btn" title="Ganti tema">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button id="notif-btn" class="icon-btn" title="Notifikasi">
          <i class="fa-solid fa-bell"></i>
          <span id="notif-badge" class="badge-dot hidden"></span>
        </button>
        <div class="user-menu">
          <button id="user-menu-btn" class="user-chip">
            <span id="user-avatar" class="avatar">U</span>
            <span id="user-name" class="user-name">Pengguna</span>
            <i class="fa-solid fa-chevron-down"></i>
          </button>
          <div id="user-menu-dropdown" class="dropdown-menu hidden">
            <a href="#" id="menu-profile"><i class="fa-solid fa-user"></i> Profil</a>
            <a href="#" id="menu-setting"><i class="fa-solid fa-gear"></i> Pengaturan</a>
            <hr>
            <a href="#" id="menu-logout"><i class="fa-solid fa-right-from-bracket"></i> Keluar</a>
          </div>
        </div>
      </div>
    </header>

    <!-- BREADCRUMB / SUBBAR -->
    <div id="page-toolbar" class="page-toolbar"><!-- diisi oleh app.js per halaman --></div>

    <!-- KONTEN HALAMAN -->
    <main id="page-content" class="page-content">
      <!-- diisi oleh app.js sesuai router -->
    </main>
  </div>
</div>

<!-- ======================================================= -->
<!-- GENERIC MODAL / DIALOG CONTAINERS                        -->
<!-- ======================================================= -->
<div id="modal-root" class="modal-root"></div>

<div id="confirm-dialog" class="modal-overlay hidden">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 id="confirm-title">Konfirmasi</h3>
      <button class="icon-btn modal-close" data-close="confirm-dialog"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <p id="confirm-message">Apakah Anda yakin?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="confirm-dialog">Batal</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Ya, Lanjutkan</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- ======================================================= -->
<!-- PLUGINS (CDN) — Leaflet, Supabase, Chart.js, JSZip, dll  -->
<!-- ======================================================= -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>
<script src="https://unpkg.com/shpjs@4.0.4/dist/shp.min.js"></script>

<!-- ================= APP CONFIG & LOGIC ================= -->
<script src="config.js"></script>
<!-- Planning Engine (fondasi Smart FTTH Planning — Implementation 01.5, stub only) -->
<script src="planning-engine.js"></script>
<!-- Planning Analyzers (Smart Planning Engine — Implementation 02 Phase 1, Analisa Area) -->
<script src="planning-analyzers.js"></script>
<!-- Planning Generators (Smart Planning Engine — Implementation 03 Phase 2, Auto Network Planning) -->
<script src="planning-generators.js"></script>
<!-- Planning Final (Smart Planning Engine — Implementation 04, Validation/Approval/Reports/Export) -->
<script src="planning-final.js"></script>
<script src="app.js"></script>
</body>
</html>
